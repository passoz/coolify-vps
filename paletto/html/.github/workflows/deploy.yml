name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy site files to VPS
        uses: appleboy/scp-action@master
        with:
          host: evolucsia.com
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "index.html,style.css,script.js,robots.txt,sitemap.xml"
          target: /home/ubuntu/vps/paletto
          strip_components: 0
