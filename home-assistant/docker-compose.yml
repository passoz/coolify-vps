# Home Assistant — Automação Residencial
# Domínio: https://ha.evolucsia.com
# Imagem real: ghcr.io/passoz/homeassistant:latest
# Container atual: l4pr3k22aqb1o20nqto1cwrg-015548443024
# OBS: Container atual NÃO publica porta no host (roteado via Traefik interno).
#      Caddy fará o mesmo via rede 'web' → sem necessidade de host port.
services:
  home-assistant:
    image: ghcr.io/passoz/homeassistant:latest
    container_name: home-assistant
    restart: unless-stopped
    volumes:
      - ha-config:/config
      - ha-backups:/backup
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - web
    labels:
      - "app=home-assistant"
      - "domain=ha.evolucsia.com"

volumes:
  ha-config:
    name: l4pr3k22aqb1o20nqto1cwrg-ha-config
    external: true
  ha-backups:
    name: l4pr3k22aqb1o20nqto1cwrg-ha-backups
    external: true

networks:
  web:
    name: web
    external: true
